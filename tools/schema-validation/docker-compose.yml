# Démarrer Docker Desktop, puis depuis ce dossier :
#   docker compose up -d
#   npm install && npm run validate
#
# Variables par défaut (voir import_and_verify.mjs) :
#   MYSQL_HOST=127.0.0.1 MYSQL_PORT=13307 MYSQL_USER=root MYSQL_PASSWORD=testroot MYSQL_DATABASE=cc_schema_test

services:
  mysql:
    image: mysql:8.4
    container_name: cccomputer-mysql-schema-test
    environment:
      MYSQL_ROOT_PASSWORD: testroot
      MYSQL_DATABASE: cc_schema_test
    ports:
      - "13307:3306"
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_general_ci
